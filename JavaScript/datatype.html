<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>DataType in js</h1>



    <script>
        // datType

        var username = "Ahtesham";
        console.log(username);

        console.log(typeof(username));

        var age = 18;
        console.log(typeof(age))

        var subs = false;
        var follow = true;
        console.log(typeof(follow));


        // undefined data type 

        var a;
        console.log(typeof(a));

        // null nothing

        var b = null
        console.log(typeof(b))

        // Array

        let student = ["ahtesham", "Aamir", "Abhi", "shivam", "akhil"];
        console.log(student);
        console.log(student[3])

    </script>

</body>
</html>
