<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let luckyNo = Math.floor( Math.random()* 6 ) + 1

        // console.log(luckyNo);

        while(true){
            
            guess = prompt("enter number btw 1 to 6")

            if( luckyNo == guess ){
                alert("you won")
                break;

            }else{
                alert("Better luck next time")
            }
        }
    </script>
</body>
</html>
