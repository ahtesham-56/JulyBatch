<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        p{
            color: red;
            font-size: 22px;
            font-family: cursive;
        }

        p.ex1{
            display: none;
    
        }
        p.ex2{
        display: block;
        background-color: blueviolet;
        }

        p.ex3{
            display: inline;
            background-color: red;
            color: white;
        }

    </style>
</head>
<body>
    <h1>Display Prop</h1>

    <h1>Display : None</h1>

    <div>
        Here the function is Disable as function
        <p class="ex1"> Hello display none</p>
    </div>

    <h1>Display : Block</h1>
    <div>
        it is similar like div container
        <p class="ex2"> Hello display block</p>
    </div>

    <h1>Display : Inline</h1>
    <div>
        it is similar like as span tag
        <p class="ex3"> Hello display inline</p>
    </div>
</body>
</html>
